<svg xmlns="http://www.w3.org/2000/svg" width="560" height="240" viewBox="0 0 560 240" role="img" aria-label="ebook forest logo (gray)">
    <defs>
    <style>
        .dark { fill:#374151 }
        .mid { fill:#6B7280 }
        .light { fill:#D1D5DB }
        .textMain { fill:#374151 }
        .textSub { fill:#6B7280 }
    </style>
    </defs>

    <!-- Icon -->
    <g transform="translate(40,30)">

    <!-- Book -->
    <path class="dark" d="M38 20c18-8 44-8 62 0v144c-18-8-44-8-62 0V20z"/>
    <path class="mid" d="M102 20c18-8 44-8 62 0v144c-18-8-44-8-62 0V20z"/>
    <rect x="98" y="22" width="6" height="140" rx="3" class="light"/>

    <!-- Trees -->
    <g transform="translate(18,-8)">
        <path class="dark" d="M60 60l22-34 22 34h-10l16 24H44l16-24h0z"/>
        <rect x="80" y="84" width="4" height="16" class="dark"/>
        
        <path class="mid" d="M108 66l16-26 16 26h-8l12 18H96l12-18h0z"/>
        <rect x="122" y="84" width="4" height="14" class="mid"/>
    </g>

    </g>

    <!-- Wordmark -->
    <g transform="translate(260,72)">
    <text x="0" y="0"
            font-family="Inter, Pretendard, system-ui, -apple-system, Segoe UI, Roboto, Arial"
            font-size="64"
            font-weight="800"
            class="textMain"
            letter-spacing="-1">
        ebook
    </text>

    <text x="0" y="68"
            font-family="Inter, Pretendard, system-ui, -apple-system, Segoe UI, Roboto, Arial"
            font-size="64"
            font-weight="800"
            class="textSub"
            letter-spacing="-1">
        forest
    </text>

    <rect x="0" y="88" width="230" height="8" rx="4" class="light"/>
    </g>
</svg>